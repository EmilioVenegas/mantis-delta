name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the package with optional SBML + numba + coverage tooling so
        # the interoperability and JIT code paths are exercised in CI.
        pip install -e ".[dev]"

    - name: Test (numba JIT enabled — validates the compiled fast path)
      run: |
        pytest tests/ -q

    - name: Test with coverage (JIT disabled — measures kernel source + fallback)
      env:
        NUMBA_DISABLE_JIT: "1"
      run: |
        pytest tests/ -v --cov=mantis --cov-branch --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: py${{ matrix.python-version }}
        token: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true
