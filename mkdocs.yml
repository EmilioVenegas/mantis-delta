site_name: pycrn
site_url: https://emiliovenegas.github.io/pycrn
repo_url: https://github.com/emiliovenegas/pycrn
repo_name: emiliovenegas/pycrn

theme:
  name: material
  palette:
    primary: indigo
    accent: deep purple
  features:
    - navigation.sections
    - navigation.top

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - API Reference: api.md
